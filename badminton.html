<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BADminton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #07070D;
      --surface:      #0D0D16;
      --card:         #11111C;
      --card-hi:      #161624;
      --border:       rgba(255,255,255,0.07);
      --border-hi:    rgba(255,255,255,0.13);
      --text:         #EEEEF8;
      --dim:          #8888AA;
      --muted:        #44445A;
      --lime:         #C9FF00;
      --lime-dim:     rgba(201,255,0,0.09);
      --lime-glow:    rgba(201,255,0,0.22);
      --lime-border:  rgba(201,255,0,0.28);
      --beg:          #4DA6FF;
      --beg-bg:       rgba(77,166,255,0.12);
      --beg-border:   rgba(77,166,255,0.28);
      --int:          #FFB627;
      --int-bg:       rgba(255,182,39,0.12);
      --int-border:   rgba(255,182,39,0.28);
      --adv:          #FF4C4C;
      --adv-bg:       rgba(255,76,76,0.12);
      --adv-border:   rgba(255,76,76,0.28);
      --win:          #00D17A;
      --win-bg:       rgba(0,209,122,0.10);
      --win-border:   rgba(0,209,122,0.28);
      --r: 12px; --r-sm: 8px; --r-xs: 6px;
    }
    .light {
      --bg:           #F0F0F8;
      --surface:      #FAFAFE;
      --card:         #EFEFF7;
      --card-hi:      #E6E6F2;
      --border:       rgba(0,0,0,0.08);
      --border-hi:    rgba(0,0,0,0.15);
      --text:         #0E0E1C;
      --dim:          #55556A;
      --muted:        #AAAABE;
      --lime:         #7AAA00;
      --lime-dim:     rgba(122,170,0,0.10);
      --lime-glow:    rgba(122,170,0,0.24);
      --lime-border:  rgba(122,170,0,0.32);
      --beg:          #0066FF;
      --beg-bg:       rgba(0,102,255,0.12);
      --beg-border:   rgba(0,102,255,0.28);
      --int:          #FF9800;
      --int-bg:       rgba(255,152,0,0.12);
      --int-border:   rgba(255,152,0,0.28);
      --adv:          #E63946;
      --adv-bg:       rgba(230,57,70,0.12);
      --adv-border:   rgba(230,57,70,0.28);
      --win:          #00A85A;
      --win-bg:       rgba(0,168,90,0.10);
      --win-border:   rgba(0,168,90,0.28);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Plus Jakarta Sans", sans-serif;
      line-height: 1.5;
      transition: background-color 0.25s, color 0.25s;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1rem;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: "Bebas Neue", cursive;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
    }
    .header-right { display: flex; gap: 0.75rem; align-items: center; }
    .theme-toggle {
      width: 44px; height: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 3px;
      transition: background 0.25s;
    }
    .theme-toggle::after {
      content: "";
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--lime);
      transition: transform 0.25s;
    }
    .light .theme-toggle::after { transform: translateX(20px); }

    /* ── LAYOUT ── */
    main { max-width: 640px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

    /* ── SECTION HEADERS ── */
    .section-title {
      font-family: "Bebas Neue", cursive;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title .count-badge {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 99px;
      background: var(--lime-dim);
      color: var(--lime);
      border: 1px solid var(--lime-border);
      letter-spacing: 0;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1rem;
    }

    /* ── FORM CONTROLS ── */
    input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--lime-border);
    }
    input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--lime);
      color: #07070D;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost {
      background: var(--card-hi);
      color: var(--dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }
    .btn-danger {
      background: var(--adv-bg);
      color: var(--adv);
      border: 1px solid var(--adv-border);
    }
    .btn-danger:hover { opacity: 0.8; }
    .btn-win {
      background: var(--win-bg);
      color: var(--win);
      border: 1px solid var(--win-border);
    }
    .btn-win:hover { opacity: 0.8; }
    .btn-sm { padding: 0.45rem 0.85rem; font-size: 0.8rem; min-height: 36px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-full { width: 100%; }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .badge-beg { background: var(--beg-bg); color: var(--beg); border: 1px solid var(--beg-border); }
    .badge-int { background: var(--int-bg); color: var(--int); border: 1px solid var(--int-border); }
    .badge-adv { background: var(--adv-bg); color: var(--adv); border: 1px solid var(--adv-border); }

    /* ── STEP SECTIONS ── */
    .step-section { margin-bottom: 2rem; }

    /* ── PLAYER INPUT ROW ── */
    .add-player-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.5rem;
      align-items: start;
      margin-bottom: 1rem;
    }
    .level-select {
      display: flex;
      gap: 0.35rem;
    }
    .level-btn {
      padding: 0.45rem 0.7rem;
      border-radius: var(--r-xs);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--dim);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
    }
    .level-btn.active-beg { background: var(--beg-bg); color: var(--beg); border-color: var(--beg-border); }
    .level-btn.active-int { background: var(--int-bg); color: var(--int); border-color: var(--int-border); }
    .level-btn.active-adv { background: var(--adv-bg); color: var(--adv); border-color: var(--adv-border); }

    /* ── PLAYER LIST ── */
    .player-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .player-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      background: var(--card-hi);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
    }
    .player-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--lime-dim);
      border: 1px solid var(--lime-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--lime);
      flex-shrink: 0;
    }
    .player-name { font-weight: 600; flex: 1; font-size: 0.95rem; }
    .player-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem;
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.15s;
      min-height: 32px; min-width: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .player-remove:hover { color: var(--adv); }

    /* ── FORMAT TOGGLE ── */
    .format-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .format-btn {
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      color: var(--dim);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      min-height: 52px;
    }
    .format-btn.active {
      background: var(--lime-dim);
      color: var(--lime);
      border-color: var(--lime-border);
    }

    /* ── SUGGESTION CHIPS ── */
    .suggestion-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    .suggestion-label {
      font-size: 0.8rem;
      color: var(--dim);
      font-weight: 600;
    }
    .suggestion-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 99px;
      border: 1px solid var(--lime-border);
      background: var(--lime-dim);
      color: var(--lime);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .suggestion-chip:hover { background: var(--lime-glow); }
    .suggestion-chip .chip-sub {
      font-weight: 500;
      opacity: 0.75;
      font-size: 0.72rem;
    }

    /* ── GENERATE ROW ── */
    .generate-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: start;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      margin-bottom: 1.25rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .progress-label { font-size: 0.85rem; color: var(--dim); font-weight: 600; }
    .progress-frac { font-size: 0.85rem; color: var(--lime); font-weight: 700; }
    .progress-bar {
      height: 6px;
      background: var(--card-hi);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--lime);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── MATCH CARDS ── */
    .matches-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .match-card.completed {
      border-color: var(--win-border);
      opacity: 0.85;
    }
    .match-card.completed:hover { opacity: 1; }

    .match-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
    }
    .match-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 28px;
    }
    .match-teams {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .team-names {
      font-weight: 700;
      font-size: 0.92rem;
    }
    .vs-sep {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .match-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .match-card.completed .status-dot { background: var(--win); }

    /* winner reveal */
    .winner-badge {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--win);
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: 99px;
      padding: 0.2rem 0.6rem;
    }

    /* ── WINNER PICKER (inline expand) ── */
    .winner-picker {
      border-top: 1px solid var(--border);
      padding: 0.85rem 1rem;
      background: var(--surface);
      display: none;
    }
    .winner-picker.open { display: block; }
    .picker-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--dim);
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .picker-teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .picker-btn {
      padding: 0.85rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.4;
      min-height: 56px;
    }
    .picker-btn:hover {
      background: var(--win-bg);
      color: var(--win);
      border-color: var(--win-border);
    }
    .picker-cancel {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0.25rem;
      text-decoration: underline;
    }
    .picker-cancel:hover { color: var(--dim); }

    /* ── LEADERBOARD ── */
    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }
    .lb-table th, .lb-table td {
      padding: 0.7rem 0.75rem;
      text-align: left;
      font-size: 0.88rem;
    }
    .lb-table th {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    .lb-table td { border-bottom: 1px solid var(--border); }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-rank { font-weight: 700; color: var(--muted); width: 32px; }
    .lb-rank.top1 { color: #FFD700; }
    .lb-rank.top2 { color: #C0C0C0; }
    .lb-rank.top3 { color: #CD7F32; }
    .lb-player { font-weight: 700; }
    .lb-num { font-weight: 600; text-align: center; width: 44px; }
    .lb-sch { color: var(--dim); }
    .lb-wins { color: var(--win); }
    .lb-pts { color: var(--lime); font-weight: 700; }

    /* ── EMPTY STATES ── */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.75rem 0;
    }

    /* ── ALERT / HINT ── */
    .hint {
      font-size: 0.82rem;
      color: var(--dim);
      background: var(--card-hi);
      border: 1px solid var(--border);
      border-radius: var(--r-xs);
      padding: 0.6rem 0.85rem;
      margin-top: 0.5rem;
    }
    .hint strong { color: var(--lime); }

    /* ── RESET BUTTON ── */
    .reset-section {
      margin-top: 2rem;
      text-align: center;
    }

    /* ── CONFETTI BANNER ── */
    .session-complete {
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: var(--r);
      padding: 1.25rem;
      text-align: center;
      margin-bottom: 1rem;
    }
    .session-complete h3 {
      font-family: "Bebas Neue", cursive;
      font-size: 1.6rem;
      color: var(--win);
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }
    .session-complete p { color: var(--dim); font-size: 0.9rem; }

    @media (max-width: 400px) {
      .add-player-row { grid-template-columns: 1fr; }
      .level-select { justify-content: flex-start; }
      .generate-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">BADminton</div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode"></button>
  </div>
</header>

<main>

  <!-- ── STEP 1: PLAYERS ── -->
  <section class="step-section" id="section-players">
    <div class="section-title">
      Players
      <span class="count-badge" id="player-count">0</span>
    </div>

    <div class="card">
      <div class="add-player-row">
        <input type="text" id="player-name-input" placeholder="Player name" maxlength="24" autocomplete="off" />
        <div class="level-select">
          <button class="level-btn" id="lvl-beg" onclick="selectLevel('beg')">B</button>
          <button class="level-btn active-int" id="lvl-int" onclick="selectLevel('int')">I</button>
          <button class="level-btn" id="lvl-adv" onclick="selectLevel('adv')">A</button>
        </div>
        <button class="btn btn-primary" onclick="addPlayer()">Add</button>
      </div>
      <div class="hint">B = Beginner · I = Intermediate · A = Advanced</div>
    </div>

    <div style="height: 0.75rem;"></div>

    <div class="player-list" id="player-list">
      <div class="empty-state">
        <div class="empty-icon">🏸</div>
        Add players to get started
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- ── STEP 2: GENERATE ── -->
  <section class="step-section" id="section-generate">
    <div class="section-title">Generate Matches</div>

    <div class="format-toggle">
      <button class="format-btn active" id="fmt-singles" onclick="selectFormat('singles')">
        Singles<br><span style="font-size:0.75rem;font-weight:500;opacity:0.7">1 vs 1</span>
      </button>
      <button class="format-btn" id="fmt-doubles" onclick="selectFormat('doubles')">
        Doubles<br><span style="font-size:0.75rem;font-weight:500;opacity:0.7">2 vs 2</span>
      </button>
    </div>

    <div class="generate-row">
      <input type="number" id="match-count-input" placeholder="Number of matches" min="1" max="100" value="10" />
      <button class="btn btn-primary" id="generate-btn" onclick="generateMatches()">Generate</button>
    </div>
    <div class="hint" id="generate-hint">Need at least <strong>2 players</strong> for singles.</div>
    <div id="match-suggestion" style="display:none; margin-top:0.5rem;"></div>
  </section>

  <div class="divider"></div>

  <!-- ── STEP 3: MATCHES ── -->
  <section class="step-section" id="section-matches" style="display:none;">
    <div class="section-title">
      Matches
      <span class="count-badge" id="matches-count">0</span>
    </div>

    <div id="session-complete-banner" style="display:none;">
      <div class="session-complete">
        <h3>Session Complete!</h3>
        <p>All matches have been played. Check the leaderboard below.</p>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Progress</span>
        <span class="progress-frac" id="progress-frac">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="matches-list" id="matches-list"></div>

    <div style="margin-top:1rem;">
      <button class="btn btn-ghost btn-full btn-sm" onclick="regenerateMatches()">↺ Regenerate All Matches</button>
    </div>
  </section>

  <!-- ── STEP 4: LEADERBOARD ── -->
  <section class="step-section" id="section-leaderboard" style="display:none;">
    <div class="divider"></div>
    <div class="section-title">Leaderboard</div>
    <div class="card" style="padding:0;">
      <table class="lb-table" id="lb-table">
        <thead>
          <tr>
            <th class="lb-rank">#</th>
            <th class="lb-player">Player</th>
            <th class="lb-num lb-sch" title="Scheduled matches">Sch</th>
            <th class="lb-num lb-wins" title="Wins">W</th>
            <th class="lb-num" title="Losses">L</th>
            <th class="lb-num lb-pts" title="Points (2 per win)">Pts</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
  </section>

  <!-- ── RESET ── -->
  <div class="reset-section" id="reset-section" style="display:none;">
    <button class="btn btn-danger btn-sm" onclick="resetSession()">Reset Session</button>
  </div>

</main>

<script>
  // ── STATE ──
  let state = {
    players: [],      // { id, name, level }
    format: 'singles',
    matches: [],      // { id, team1, team2, status, winner }
    nextPlayerId: 1,
    nextMatchId: 1,
  };

  let selectedLevel = 'int';

  // ── THEME ──
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('bad-theme') || 'dark';
  html.classList.toggle('light', savedTheme === 'light');
  themeToggle.addEventListener('click', () => {
    html.classList.toggle('light');
    localStorage.setItem('bad-theme', html.classList.contains('light') ? 'light' : 'dark');
  });

  // ── LEVEL SELECT ──
  function selectLevel(lvl) {
    selectedLevel = lvl;
    ['beg','int','adv'].forEach(l => {
      const btn = document.getElementById('lvl-' + l);
      btn.className = 'level-btn' + (l === lvl ? ' active-' + l : '');
    });
  }

  // ── ADD PLAYER ──
  function addPlayer() {
    const input = document.getElementById('player-name-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }

    state.players.push({ id: state.nextPlayerId++, name, level: selectedLevel });
    input.value = '';
    input.focus();
    renderPlayers();
    updateGenerateHint();
    saveState();
  }

  document.getElementById('player-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  function removePlayer(id) {
    state.players = state.players.filter(p => p.id !== id);
    renderPlayers();
    updateGenerateHint();
    saveState();
  }

  function renderPlayers() {
    const list = document.getElementById('player-list');
    const count = state.players.length;
    document.getElementById('player-count').textContent = count;

    if (count === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🏸</div>Add players to get started</div>';
      return;
    }

    list.innerHTML = state.players.map(p => `
      <div class="player-item">
        <div class="player-avatar">${p.name.charAt(0).toUpperCase()}</div>
        <div class="player-name">${escHtml(p.name)}</div>
        <span class="badge badge-${p.level}">${p.level === 'beg' ? 'Beginner' : p.level === 'int' ? 'Int' : 'Adv'}</span>
        <button class="player-remove" onclick="removePlayer(${p.id})" title="Remove">✕</button>
      </div>
    `).join('');
  }

  // ── FORMAT ──
  function selectFormat(fmt) {
    state.format = fmt;
    document.getElementById('fmt-singles').classList.toggle('active', fmt === 'singles');
    document.getElementById('fmt-doubles').classList.toggle('active', fmt === 'doubles');
    updateGenerateHint();
    saveState();
  }

  function updateGenerateHint() {
    const hint = document.getElementById('generate-hint');
    const suggestionEl = document.getElementById('match-suggestion');
    const ppm = state.format === 'doubles' ? 4 : 2; // players per match
    const n = state.players.length;

    if (n < ppm) {
      hint.innerHTML = `Need at least <strong>${ppm} players</strong> for ${state.format}. You have ${n}.`;
      suggestionEl.style.display = 'none';
      return;
    }

    hint.innerHTML = `Ready — <strong>${n} players</strong> loaded.`;

    // Build suggestions: find the first few K values where everyone plays equally
    // n * K must be divisible by ppm → each player plays exactly K times
    const suggestions = [];
    for (let k = 1; suggestions.length < 3 && k <= 30; k++) {
      if ((n * k) % ppm === 0) {
        suggestions.push({ matches: (n * k) / ppm, gamesEach: k });
      }
    }

    if (suggestions.length === 0) { suggestionEl.style.display = 'none'; return; }

    suggestionEl.style.display = '';
    suggestionEl.innerHTML = `
      <div class="suggestion-row">
        <span class="suggestion-label">Ideal:</span>
        ${suggestions.map(s => `
          <button class="suggestion-chip" onclick="applySuggestion(${s.matches})" title="Each player plays ${s.gamesEach} match${s.gamesEach > 1 ? 'es' : ''}">
            ${s.matches} matches
            <span class="chip-sub">(×${s.gamesEach} each)</span>
          </button>
        `).join('')}
      </div>
    `;
  }

  function applySuggestion(count) {
    document.getElementById('match-count-input').value = count;
  }

  // ── GENERATE MATCHES ──
  function generateMatches() {
    const countInput = document.getElementById('match-count-input');
    const count = parseInt(countInput.value, 10);
    const needed = state.format === 'doubles' ? 4 : 2;

    if (state.players.length < needed) {
      updateGenerateHint();
      countInput.focus();
      return;
    }
    if (!count || count < 1) { countInput.focus(); return; }

    state.matches = buildMatches(state.players, count, state.format);
    state.nextMatchId = state.matches.length + 1;
    renderMatchSection();
    renderLeaderboard();
    saveState();
    document.getElementById('section-matches').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function regenerateMatches() {
    const countInput = document.getElementById('match-count-input');
    const count = parseInt(countInput.value, 10) || state.matches.length || 10;
    const needed = state.format === 'doubles' ? 4 : 2;
    if (state.players.length < needed) return;

    state.matches = buildMatches(state.players, count, state.format);
    renderMatchSection();
    renderLeaderboard();
    saveState();
  }

  function buildMatches(players, count, format) {
    const matches = [];
    const usedKeys = new Set();
    const maxAttempts = count * 20;
    let attempts = 0;

    while (matches.length < count && attempts < maxAttempts) {
      attempts++;
      const shuffled = shuffle([...players]);

      if (format === 'doubles') {
        if (shuffled.length < 4) break;
        const team1 = [shuffled[0], shuffled[1]];
        const team2 = [shuffled[2], shuffled[3]];
        const key = makeKey(team1, team2);
        if (!usedKeys.has(key) || uniquePairingsExhausted(players.length, usedKeys.size, 'doubles')) {
          usedKeys.add(key);
          matches.push({ id: matches.length + 1, team1, team2, status: 'pending', winner: null });
        }
      } else {
        if (shuffled.length < 2) break;
        const team1 = [shuffled[0]];
        const team2 = [shuffled[1]];
        const key = makeKey(team1, team2);
        if (!usedKeys.has(key) || uniquePairingsExhausted(players.length, usedKeys.size, 'singles')) {
          usedKeys.add(key);
          matches.push({ id: matches.length + 1, team1, team2, status: 'pending', winner: null });
        }
      }
    }

    // If still short (too few unique combos), fill with random repeats
    while (matches.length < count) {
      const shuffled = shuffle([...players]);
      if (format === 'doubles' && shuffled.length >= 4) {
        matches.push({ id: matches.length + 1, team1: [shuffled[0], shuffled[1]], team2: [shuffled[2], shuffled[3]], status: 'pending', winner: null });
      } else if (format === 'singles' && shuffled.length >= 2) {
        matches.push({ id: matches.length + 1, team1: [shuffled[0]], team2: [shuffled[1]], status: 'pending', winner: null });
      } else break;
    }

    return matches;
  }

  function uniquePairingsExhausted(n, used, format) {
    // rough max unique matchups
    const max = format === 'doubles' ? combinations(n, 4) * 3 : combinations(n, 2);
    return used >= max * 0.9;
  }

  function combinations(n, k) {
    if (k > n) return 0;
    let result = 1;
    for (let i = 0; i < k; i++) result = result * (n - i) / (i + 1);
    return Math.floor(result);
  }

  function makeKey(team1, team2) {
    const t1 = team1.map(p => p.id).sort().join(',');
    const t2 = team2.map(p => p.id).sort().join(',');
    return [t1, t2].sort().join('|');
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── RENDER MATCHES ──
  function renderMatchSection() {
    const section = document.getElementById('section-matches');
    const resetSection = document.getElementById('reset-section');
    section.style.display = state.matches.length > 0 ? '' : 'none';
    resetSection.style.display = state.matches.length > 0 ? '' : 'none';

    document.getElementById('matches-count').textContent = state.matches.length;

    const completed = state.matches.filter(m => m.status === 'completed').length;
    const total = state.matches.length;
    document.getElementById('progress-frac').textContent = `${completed} / ${total}`;
    document.getElementById('progress-fill').style.width = total > 0 ? `${(completed / total) * 100}%` : '0%';

    const banner = document.getElementById('session-complete-banner');
    banner.style.display = (total > 0 && completed === total) ? '' : 'none';

    const list = document.getElementById('matches-list');
    list.innerHTML = state.matches.map(m => renderMatchCard(m)).join('');
  }

  function renderMatchCard(m) {
    const t1names = m.team1.map(p => escHtml(p.name)).join(' & ');
    const t2names = m.team2.map(p => escHtml(p.name)).join(' & ');
    const isCompleted = m.status === 'completed';
    const winnerTeam = isCompleted ? (m.winner === 1 ? t1names : t2names) : '';

    return `
      <div class="match-card ${isCompleted ? 'completed' : ''}" id="match-${m.id}">
        <div class="match-header">
          <div class="match-num">#${m.id}</div>
          <div class="match-teams">
            <span class="team-names">${t1names}</span>
            <span class="vs-sep">VS</span>
            <span class="team-names">${t2names}</span>
          </div>
          <div class="match-status">
            ${isCompleted
              ? `<span class="winner-badge">🏆 ${winnerTeam}</span>`
              : `<div class="status-dot"></div>
                 <button class="btn btn-ghost btn-sm" onclick="openPicker(${m.id})">Done</button>`
            }
            ${isCompleted
              ? `<button class="player-remove" onclick="undoMatch(${m.id})" title="Undo">↩</button>`
              : ''
            }
          </div>
        </div>
        <div class="winner-picker" id="picker-${m.id}">
          <div class="picker-label">Who won?</div>
          <div class="picker-teams">
            <button class="picker-btn" onclick="setWinner(${m.id}, 1)">${t1names}</button>
            <button class="picker-btn" onclick="setWinner(${m.id}, 2)">${t2names}</button>
          </div>
          <button class="picker-cancel" onclick="closePicker(${m.id})">Cancel</button>
        </div>
      </div>
    `;
  }

  function openPicker(id) {
    // close any open pickers
    document.querySelectorAll('.winner-picker.open').forEach(el => el.classList.remove('open'));
    const picker = document.getElementById('picker-' + id);
    if (picker) picker.classList.add('open');
  }

  function closePicker(id) {
    const picker = document.getElementById('picker-' + id);
    if (picker) picker.classList.remove('open');
  }

  function setWinner(id, winner) {
    const match = state.matches.find(m => m.id === id);
    if (!match) return;
    match.status = 'completed';
    match.winner = winner;
    renderMatchSection();
    renderLeaderboard();
    saveState();
  }

  function undoMatch(id) {
    const match = state.matches.find(m => m.id === id);
    if (!match) return;
    match.status = 'pending';
    match.winner = null;
    renderMatchSection();
    renderLeaderboard();
    saveState();
  }

  // ── LEADERBOARD ──
  function renderLeaderboard() {
    const section = document.getElementById('section-leaderboard');

    if (state.matches.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';

    // Tally
    const stats = {};
    state.players.forEach(p => {
      stats[p.id] = { player: p, scheduled: 0, wins: 0, losses: 0 };
    });

    // Scheduled count from ALL matches
    state.matches.forEach(m => {
      [...m.team1, ...m.team2].forEach(p => {
        if (stats[p.id]) stats[p.id].scheduled++;
      });
    });

    // W/L from completed matches
    state.matches.filter(m => m.status === 'completed').forEach(m => {
      const winners = m.winner === 1 ? m.team1 : m.team2;
      const losers  = m.winner === 1 ? m.team2 : m.team1;
      winners.forEach(p => { if (stats[p.id]) stats[p.id].wins++; });
      losers.forEach(p =>  { if (stats[p.id]) stats[p.id].losses++; });
    });

    const rows = Object.values(stats)
      .filter(s => s.scheduled > 0)
      .sort((a, b) => (b.wins - a.wins) || (b.scheduled - a.scheduled) || a.player.name.localeCompare(b.player.name));

    const rankClasses = ['top1','top2','top3'];
    const anyCompleted = rows.some(s => s.wins + s.losses > 0);

    document.getElementById('lb-body').innerHTML = rows.map((s, i) => {
      const rank = anyCompleted ? i + 1 : '—';
      const rankClass = anyCompleted ? (rankClasses[i] || '') : '';
      return `
      <tr>
        <td class="lb-rank ${rankClass}">${rank}</td>
        <td class="lb-player">
          ${escHtml(s.player.name)}
          <span class="badge badge-${s.player.level}" style="margin-left:0.4rem">${s.player.level === 'beg' ? 'B' : s.player.level === 'int' ? 'I' : 'A'}</span>
        </td>
        <td class="lb-num lb-sch">${s.scheduled}</td>
        <td class="lb-num lb-wins">${s.wins}</td>
        <td class="lb-num">${s.losses}</td>
        <td class="lb-num lb-pts">${s.wins * 2}</td>
      </tr>
    `}).join('');
  }

  // ── RESET ──
  function resetSession() {
    if (!confirm('Reset all matches? Players will be kept.')) return;
    state.matches = [];
    state.nextMatchId = 1;
    document.getElementById('section-matches').style.display = 'none';
    document.getElementById('section-leaderboard').style.display = 'none';
    document.getElementById('reset-section').style.display = 'none';
    saveState();
  }

  // ── PERSIST ──
  function saveState() {
    try { localStorage.setItem('bad-state', JSON.stringify(state)); } catch(e) {}
  }

  function loadState() {
    try {
      const saved = localStorage.getItem('bad-state');
      if (saved) {
        const parsed = JSON.parse(saved);
        state = { ...state, ...parsed };
      }
    } catch(e) {}
  }

  // ── UTILS ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── INIT ──
  loadState();
  renderPlayers();
  selectFormat(state.format);
  updateGenerateHint();
  if (state.matches.length > 0) {
    renderMatchSection();
    renderLeaderboard();
  }
</script>
</body>
</html>
